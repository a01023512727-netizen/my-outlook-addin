<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>거래처 정보</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root{
      --brand:#2b579a;
      --border:#e7e7e7;
      --muted:#6b7280;
      --bg:#ffffff;
      --card:#ffffff;
      --chip:#f7f7f8;
      --tabBg:#f3f4f6;
    }
    body { font-family: 'Segoe UI', sans-serif; padding: 14px; margin: 0; background: var(--bg); }

    .header {
      color: var(--brand);
      font-size: 16px;
      font-weight: 800;
      border-bottom: 2px solid var(--brand);
      padding-bottom: 8px;
      margin-bottom: 12px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--tabBg);
      color: #111827;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s ease;
    }

    .tab-btn.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: var(--card);
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
      margin-bottom: 12px;
    }

    .row {
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin: 6px 0;
      font-size: 13px;
    }

    .label {
      color: var(--muted);
      min-width: 120px;
    }

    .value {
      font-weight: 800;
      color:#111827;
      word-break: break-all;
      text-align: right;
    }

    .status {
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      padding:6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--chip);
    }

    .dot {
      width:8px;
      height:8px;
      border-radius:999px;
      background:#9ca3af;
    }

    .ok .dot { background:#16a34a; }
    .warn .dot { background:#f59e0b; }

    .grid {
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top: 6px;
    }

    .field {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .field .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .field .v {
      font-size: 12px;
      font-weight: 800;
      color:#111827;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .feeWrap {
      margin-top: 10px;
      border-top: 1px dashed var(--border);
      padding-top: 10px;
    }

    .feeTop {
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background: var(--chip);
      color:#111827;
    }

    .input {
      padding: 9px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      width: 160px;
      outline: none;
    }

    .input:focus {
      border-color: rgba(43,87,154,0.5);
      box-shadow: 0 0 0 3px rgba(43,87,154,0.12);
    }

    button {
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fafafa;
      cursor: pointer;
      font-weight: 700;
      width: 100%;
    }

    .error {
      color: #b00020;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.4;
      margin-top: 10px;
    }

    .quote-hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      line-height: 1.4;
    }

    .quote-body {
      margin-top: 10px;
      max-height: min(60vh, 520px);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fafafa;
      color: #111827;
      font-family: inherit;
    }

    #btnQuoteRefresh {
      margin-top: 12px;
    }

    .quote-ai-card {
      margin-top: 12px;
    }

    .quote-ai-verdict {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      margin-top: 8px;
      line-height: 1.45;
    }

    .quote-ai-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .quote-criteria-wrap {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border);
    }

    .quote-criteria-title {
      font-size: 13px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
    }

    /* 견적 블록: 태스크창이 좁아도 버튼이 잘리지 않도록 세로 배치 + 전체 너비 */
    .quote-block-head {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      margin-top: 12px;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed var(--border);
    }

    .quote-block-head:first-child {
      margin-top: 0;
    }

    .quote-block-head .quote-block-title-text {
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      line-height: 1.3;
    }

    button.quote-reply-btn {
      display: block;
      box-sizing: border-box;
      width: 100%;
      max-width: 100%;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      margin: 0;
      color: var(--brand);
      background: #f0f4fa;
      border: 1px solid rgba(43, 87, 154, 0.45);
      border-radius: 10px;
      cursor: pointer;
    }

    button.quote-reply-btn:hover {
      background: #e2e9f5;
    }
  </style>
</head>
<body>
  <div class="header">📌 거래처 정보</div>

  <div class="tabs">
    <button type="button" class="tab-btn active" data-tab="vendorTab">업체정보</button>
    <button type="button" class="tab-btn" data-tab="quoteTab">견적</button>
  </div>

  <div id="vendorTab" class="tab-panel active">
    <div class="card">
      <div class="row"><div class="label">발신자 이메일</div><div class="value" id="fromEmail">-</div></div>
      <div class="row"><div class="label">발신자 도메인</div><div class="value" id="fromDomain">-</div></div>
      <div style="margin-top:10px;">
        <span class="status" id="statusPill"><span class="dot"></span><span id="statusText">대기중</span></span>
      </div>
    </div>

    <div class="card">
      <div class="row" style="align-items:center;">
        <div class="label" style="font-weight:800;color:#111827;">조회 결과</div>
        <div style="flex:1;"></div>
        <span class="status" id="resultPill"><span class="dot"></span><span id="resultText">-</span></span>
      </div>

      <div id="fields" class="grid"></div>
    </div>

    <button id="btnRefresh">새로고침</button>
    <div class="error" id="error"></div>
  </div>

  <div id="quoteTab" class="tab-panel">
    <div class="card">
      <div class="row" style="align-items:center;">
        <div class="label" style="font-weight:800;color:#111827;">이 메일 본문</div>
        <div style="flex:1;"></div>
        <span class="status" id="quoteStatusPill"><span class="dot"></span><span id="quoteStatusText">대기</span></span>
      </div>
      <p class="quote-hint">현재 메일 읽기 창에 열려 있는 <strong>한 통</strong>의 본문만 가져옵니다. (대화 스레드 전체가 아닙니다.)</p>
      <pre class="quote-body" id="quoteBody" aria-live="polite">견적 탭을 열면 본문을 불러옵니다.</pre>
      <div class="card quote-ai-card">
        <div class="row" style="align-items:center;">
          <div class="label" style="font-weight:800;color:#111827;">항공 견적 여부 (AI)</div>
          <div style="flex:1;"></div>
          <span class="status" id="quoteAiPill"><span class="dot"></span><span id="quoteAiStatusText">대기</span></span>
        </div>
        <p class="quote-ai-meta">본문 앞부분 최대 500자만 서버로 보내 견적 여부 판단 및 검색 조건을 추출합니다. (OpenAI, 키는 Vercel 환경 변수)</p>
        <div class="quote-ai-verdict" id="quoteAiVerdict">—</div>
        <div class="quote-criteria-wrap" id="quoteCriteriaWrap" style="display: none;">
          <div class="quote-criteria-title">항공권 검색 조건 (견적별 · 여정별)</div>
          <p class="quote-hint" style="margin-top: 0; margin-bottom: 8px;">각 여정 한 줄 형식: 출발지 / 출발일 / 출발시간 / 도착시간 / 항공사 (없으면 Null)</p>
          <div id="quoteCriteriaFields" class="grid"></div>
        </div>
        <div class="error" id="quoteAiError"></div>
      </div>
      <div class="error" id="quoteError"></div>
      <button type="button" id="btnQuoteRefresh">본문 다시 읽기</button>
    </div>
  </div>

  <script>
    // 여기에 실제 Vercel 배포 주소 입력
    const API_BASE_URL = "https://v0-api-script-generation.vercel.app";

    const FEE_FIELD_CANDIDATES = ["수수료", "fee", "commission", "커미션", "rate"];
    const HIDE_FIELDS = ["email", "이메일", "domain", "도메인"];
    const SKIP_FIRST_COLUMN = true;

    document.getElementById("btnRefresh").addEventListener("click", run);

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        const targetId = btn.dataset.tab;

        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach((panel) => panel.classList.remove("active"));

        btn.classList.add("active");
        document.getElementById(targetId).classList.add("active");
        if (targetId === "quoteTab") {
          refreshQuoteBody();
        }
      });
    });

    document.getElementById("btnQuoteRefresh").addEventListener("click", () => refreshQuoteBody());

    Office.onReady(() => {
      try {
        Office.context.mailbox.addHandlerAsync(Office.EventType.ItemChanged, () => {
          run();
          refreshQuoteBody();
        });
      } catch (e) {
        console.error("ItemChanged handler failed:", e);
      }
      run();
    });

    async function run() {
      clearError();
      setStatus("불러오는 중...", "warn");
      setResult("-", "warn");
      document.getElementById("fields").innerHTML = "";

      try {
        const { fromEmail, fromDomain } = getFromInfo();

        document.getElementById("fromEmail").textContent = fromEmail || "(없음)";
        document.getElementById("fromDomain").textContent = fromDomain || "(없음)";

        if (!fromDomain) {
          setStatus("발신자 도메인을 읽지 못했습니다.", "warn");
          return;
        }

        const json = await fetchVendorInfo(fromDomain);

        if (!json.allowed) {
          setStatus("완료", "ok");
          setResult("등록되지 않은 도메인", "warn");
          return;
        }

        if (json.matched === false) {
          setStatus("완료", "ok");
          setResult("등록됨 / data 매칭 없음", "warn");
          return;
        }

        if (!json.record || typeof json.record !== "object") {
          setStatus("에러", "warn");
          setResult("응답 형식 오류", "warn");
          throw new Error("API 응답에 record가 없습니다.");
        }

        setStatus("완료", "ok");
        setResult("매칭됨 ✅", "ok");
        renderFields(json);

      } catch (e) {
        console.error(e);
        setStatus("에러", "warn");
        showError((e && e.message) ? e.message : String(e));
      }
    }

    function refreshQuoteBody() {
      const bodyEl = document.getElementById("quoteBody");
      const errEl = document.getElementById("quoteError");

      errEl.textContent = "";
      document.getElementById("quoteAiError").textContent = "";
      hideQuoteCriteria();
      setQuoteAiRow("대기", "warn", "—");
      setQuoteStatus("불러오는 중...", "warn");

      const item = Office?.context?.mailbox?.item;
      if (!item) {
        bodyEl.textContent = "";
        setQuoteStatus("항목 없음", "warn");
        errEl.textContent = "메일 읽기 화면에서 애드인을 열어주세요.";
        hideQuoteCriteria();
        setQuoteAiRow("—", "warn", "—");
        return;
      }

      if (typeof item.body?.getAsync !== "function") {
        bodyEl.textContent = "";
        setQuoteStatus("미지원", "warn");
        errEl.textContent = "이 항목에서는 본문을 읽을 수 없습니다.";
        hideQuoteCriteria();
        setQuoteAiRow("—", "warn", "—");
        return;
      }

      item.body.getAsync(Office.CoercionType.Text, (result) => {
        if (result.status !== Office.AsyncResultStatus.Succeeded) {
          bodyEl.textContent = "";
          setQuoteStatus("에러", "warn");
          errEl.textContent = result.error?.message || "본문을 읽지 못했습니다.";
          hideQuoteCriteria();
          setQuoteAiRow("에러", "warn", "—");
          return;
        }

        const text = result.value != null ? String(result.value) : "";
        bodyEl.textContent = text.trim() === "" ? "(본문이 비어 있거나 가져올 수 없습니다.)" : text;
        setQuoteStatus("완료", "ok");
        void runFlightQuoteClassification(text);
      });
    }

    function setQuoteAiRow(pillText, tone, verdictText) {
      const pill = document.getElementById("quoteAiPill");
      const st = document.getElementById("quoteAiStatusText");
      const verdict = document.getElementById("quoteAiVerdict");
      st.textContent = pillText;
      pill.classList.remove("ok", "warn");
      pill.classList.add(tone === "ok" ? "ok" : "warn");
      verdict.textContent = verdictText;
    }

    const MAX_QUOTE_BODY_SEND = 500;

    /** 전체 회신 시 사용할 최근 견적 배열 (renderQuoteCriteria에서 갱신) */
    let cachedQuotesForReply = null;

    (function attachQuoteReplyClick() {
      const fields = document.getElementById("quoteCriteriaFields");
      if (!fields) return;
      fields.addEventListener("click", (e) => {
        const t = e.target;
        const btn = t && typeof t.closest === "function" ? t.closest(".quote-reply-btn") : null;
        if (!btn) return;
        e.preventDefault();
        const idx = parseInt(btn.getAttribute("data-quote-index"), 10);
        if (Number.isNaN(idx)) return;
        replyAllWithQuoteBody(idx);
      });
    })();

    function hideQuoteCriteria() {
      const wrap = document.getElementById("quoteCriteriaWrap");
      const fields = document.getElementById("quoteCriteriaFields");
      wrap.style.display = "none";
      fields.innerHTML = "";
      cachedQuotesForReply = null;
    }

    /** 빈 값은 UI에서 Null (대문자 N) */
    function formatQuoteCell(val) {
      if (val == null) return "Null";
      const s = String(val).trim();
      if (!s) return "Null";
      if (/^[a-zA-Z]{3}$/.test(s)) return s.toUpperCase();
      if (/^[a-zA-Z]{2}$/.test(s)) return s.toUpperCase();
      return s;
    }

    function journeyLine(j) {
      const o = j && typeof j === "object" ? j : {};
      return [
        formatQuoteCell(o.departure),
        formatQuoteCell(o.departureDate),
        formatQuoteCell(o.departureTime),
        formatQuoteCell(o.arrivalTime),
        formatQuoteCell(o.airline),
      ].join(" / ");
    }

    function buildQuoteReplyPlainText(quoteIndex) {
      const q = cachedQuotesForReply?.[quoteIndex];
      if (!q) return "";
      const lines = [];
      lines.push(`견적 ${quoteIndex + 1}`);
      lines.push("");
      lines.push("출발지 / 출발일 / 출발시간 / 도착시간 / 항공사");
      lines.push("");
      const journeys = Array.isArray(q.journeys) ? q.journeys : [];
      if (journeys.length === 0) {
        lines.push(`여정1: ${journeyLine({})}`);
      } else {
        journeys.forEach((j, ji) => {
          lines.push(`여정${ji + 1}: ${journeyLine(j)}`);
        });
      }
      return lines.join("\n");
    }

    function nl2brHtml(text) {
      return escapeHtml(text).replaceAll("\n", "<br>");
    }

    function replyAllWithQuoteBody(quoteIndex) {
      const aiErr = document.getElementById("quoteAiError");
      aiErr.textContent = "";

      const item = Office?.context?.mailbox?.item;
      if (!item) {
        aiErr.textContent = "메일 읽기 화면에서만 전체 회신을 사용할 수 있습니다.";
        return;
      }
      if (typeof item.displayReplyAllFormAsync !== "function") {
        aiErr.textContent = "이 Outlook 환경에서는 전체 회신 창을 열 수 없습니다. (데스크톱 또는 Outlook 웹 최신 버전을 사용해 보세요.)";
        return;
      }

      const plain = buildQuoteReplyPlainText(quoteIndex);
      if (!plain) {
        aiErr.textContent = "회신할 견적 데이터가 없습니다. 본문을 다시 불러오세요.";
        return;
      }

      const htmlBody = `<div style="font-family:'Segoe UI',sans-serif;font-size:12px;line-height:1.5;">${nl2brHtml(plain)}</div>`;

      item.displayReplyAllFormAsync({ htmlBody }, (result) => {
        if (result.status !== Office.AsyncResultStatus.Succeeded) {
          aiErr.textContent = result.error?.message || "전체 회신 창을 열 수 없습니다.";
        }
      });
    }

    /**
     * quotes: [ { journeys: [ { departure, departureDate, departureTime, arrivalTime, airline } ] }, ... ]
     */
    function renderQuoteCriteria(quotes) {
      const wrap = document.getElementById("quoteCriteriaWrap");
      const container = document.getElementById("quoteCriteriaFields");
      container.innerHTML = "";

      const list = Array.isArray(quotes) ? quotes : [];
      cachedQuotesForReply = JSON.parse(JSON.stringify(list));

      if (list.length === 0) {
        cachedQuotesForReply = null;
        const div = document.createElement("div");
        div.className = "field";
        div.innerHTML = `<div class="k">안내</div><div class="v">추출된 견적이 없습니다.</div>`;
        container.appendChild(div);
        wrap.style.display = "block";
        return;
      }

      list.forEach((quote, qi) => {
        const head = document.createElement("div");
        head.className = "quote-block-head";
        const titleText = document.createElement("span");
        titleText.className = "quote-block-title-text";
        titleText.textContent = `견적 ${qi + 1}`;
        const replyBtn = document.createElement("button");
        replyBtn.type = "button";
        replyBtn.className = "quote-reply-btn";
        replyBtn.setAttribute("data-quote-index", String(qi));
        replyBtn.textContent = "전체 회신";
        head.appendChild(titleText);
        head.appendChild(replyBtn);
        container.appendChild(head);

        const journeys = Array.isArray(quote?.journeys) ? quote.journeys : [];
        if (journeys.length === 0) {
          const div = document.createElement("div");
          div.className = "field";
          div.innerHTML = `
            <div class="k">여정1</div>
            <div class="v">${escapeHtml(journeyLine({}))}</div>
          `;
          container.appendChild(div);
          return;
        }

        journeys.forEach((j, ji) => {
          const div = document.createElement("div");
          div.className = "field";
          div.innerHTML = `
            <div class="k">여정${ji + 1}</div>
            <div class="v">${escapeHtml(journeyLine(j))}</div>
          `;
          container.appendChild(div);
        });
      });

      wrap.style.display = "block";
    }

    async function runFlightQuoteClassification(fullBody) {
      const aiErr = document.getElementById("quoteAiError");
      aiErr.textContent = "";

      const trimmed = String(fullBody ?? "").trim();
      if (!trimmed) {
        hideQuoteCriteria();
        setQuoteAiRow("완료", "warn", "본문이 없어 판단할 수 없습니다.");
        return;
      }

      hideQuoteCriteria();
      const payloadText = trimmed.slice(0, MAX_QUOTE_BODY_SEND);
      setQuoteAiRow("분석 중...", "warn", "…");

      const url = `${API_BASE_URL}/api/classify-flight-quote`;
      try {
        const res = await fetch(url, {
          method: "POST",
          mode: "cors",
          cache: "no-store",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json",
          },
          body: JSON.stringify({ text: payloadText }),
        });

        const raw = await res.text();
        let data;
        try {
          data = raw ? JSON.parse(raw) : {};
        } catch {
          throw new Error(`서버 응답을 해석할 수 없습니다. (${res.status})`);
        }

        if (!res.ok) {
          const msg =
            data.openaiMessage ||
            data.error ||
            data.detail ||
            raw ||
            `HTTP ${res.status}`;
          throw new Error(typeof msg === "string" ? msg : JSON.stringify(msg));
        }

        const line =
          typeof data.message === "string" && data.message
            ? data.message
            : data.isFlightQuoteRequest
              ? "항공 견적요청입니다"
              : "항공 견적 요청이 아닙니다";

        setQuoteAiRow("완료", "ok", line);

        if (data.isFlightQuoteRequest && Array.isArray(data.quotes)) {
          renderQuoteCriteria(data.quotes);
        } else {
          hideQuoteCriteria();
        }
      } catch (e) {
        console.error(e);
        hideQuoteCriteria();
        setQuoteAiRow("에러", "warn", "—");
        aiErr.textContent = (e && e.message) ? e.message : String(e);
      }
    }

    function setQuoteStatus(text, tone) {
      const pill = document.getElementById("quoteStatusPill");
      const t = document.getElementById("quoteStatusText");
      t.textContent = text;
      pill.classList.remove("ok", "warn");
      pill.classList.add(tone === "ok" ? "ok" : "warn");
    }

    function getFromInfo() {
      const item = Office?.context?.mailbox?.item;
      if (!item) {
        throw new Error("Office.context.mailbox.item 이 없습니다. (메일 읽기 화면에서 열어주세요)");
      }

      const fromEmail = item?.from?.emailAddress || "";
      const fromDomain = normalizeToDomain(fromEmail);

      return { fromEmail, fromDomain };
    }

    function normalizeToDomain(value) {
      if (value == null) return "";
      let s = String(value);
      s = s.replace(/\u00A0/g, " ").trim().toLowerCase();
      s = s.replace(/^https?:\/\//, "");
      s = s.replace(/,.*$/, "");
      s = s.replace(/\/.*$/, "");
      s = s.replace(/^[.@]+/, "");
      if (s.includes("@")) s = s.slice(s.lastIndexOf("@") + 1).trim();
      return s;
    }

    async function fetchVendorInfo(domain) {
      const url = `${API_BASE_URL}/api/vendor?domain=${encodeURIComponent(domain)}`;

      let res;
      try {
        res = await fetch(url, {
          method: "GET",
          mode: "cors",
          cache: "no-store",
          headers: {
            "Accept": "application/json"
          }
        });
      } catch (e) {
        const hint =
          [
            "네트워크 오류로 API 호출이 실패했습니다. (브라우저/Outlook WebView에서 'Failed to fetch'로 보일 수 있어요)",
            "",
            `요청 URL: ${url}`,
            "",
            "가능한 원인:",
            "- API 서버가 CORS를 허용하지 않음 (Access-Control-Allow-Origin 필요)",
            "- API 서버가 HTTP/인증서/리다이렉트 문제로 차단됨",
            "- Outlook add-in manifest에 외부 도메인(AppDomains)이 등록되지 않음",
            "",
            "조치:",
            "- Vercel API에서 응답 헤더에 Access-Control-Allow-Origin을 추가하고 OPTIONS(preflight)도 처리하세요",
            "- 또는 동일 도메인으로 프록시를 두세요",
          ].join("\n");
        throw new Error(hint);
      }

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(`API 호출 실패 (${res.status}) ${text}`);
      }

      return await res.json();
    }

    function renderFields(json) {
      const record = json.record;
      const headers = Array.isArray(json.headers) ? json.headers : Object.keys(record);

      let keys = headers.filter((h) => String(h || "").trim() !== "");
      if (SKIP_FIRST_COLUMN && keys.length > 0) keys = keys.slice(1);

      keys = keys.filter(
        (k) => !HIDE_FIELDS.map((x) => x.toLowerCase()).includes(String(k).toLowerCase())
      );

      const feeKey = findFeeKey(record, keys);
      const feeRaw = feeKey ? record[feeKey] : null;
      const feeRate = parsePercentToRate(feeRaw);

      const container = document.getElementById("fields");
      container.innerHTML = "";

      for (const k of keys) {
        const v = record[k];

        if (feeKey && String(k) === String(feeKey)) {
          container.appendChild(renderFeeField(k, v, feeRate));
          continue;
        }

        container.appendChild(renderPrettyField(k, v));
      }
    }

    function renderPrettyField(key, value) {
      const div = document.createElement("div");
      div.className = "field";
      div.innerHTML = `
        <div class="k">${escapeHtml(key)}</div>
        <div class="v">${escapeHtml(formatValue(value))}</div>
      `;
      return div;
    }

    function renderFeeField(key, value, feeRate) {
      const div = document.createElement("div");
      div.className = "field";

      const feeText = feeRate != null ? formatRateAsPercentText(value, feeRate) : formatValue(value);

      div.innerHTML = `
        <div class="k">${escapeHtml(key)}</div>
        <div class="v">${escapeHtml(feeText)}</div>
        <div class="feeWrap" id="feeWrap">
          <div class="feeTop">
            <span class="chip" id="feeChip">수수료: ${escapeHtml(feeText)}</span>
            <input class="input" id="amountInput" placeholder="금액 입력 (예: 10000)" inputmode="numeric" />
            <span class="chip" id="resultChip">결과: -</span>
          </div>
        </div>
      `;

      if (feeRate == null) {
        div.querySelector("#feeWrap").style.display = "none";
        return div;
      }

      const amountInput = div.querySelector("#amountInput");
      const resultChip = div.querySelector("#resultChip");

      amountInput.addEventListener("input", () => {
        const amount = parseMoney(amountInput.value);
        if (amount == null) {
          resultChip.textContent = "결과: -";
          return;
        }
        const feeAmount = Math.round(amount * feeRate);
        resultChip.textContent =
          `결과: ${formatMoney(feeAmount)} ( ${formatMoney(amount)} × ${formatRateNumber(feeRate)}% )`;
      });

      return div;
    }

    function findFeeKey(record, keys) {
      const keyLower = keys.map((k) => [k, String(k).trim().toLowerCase()]);

      for (const cand of FEE_FIELD_CANDIDATES) {
        const c = cand.toLowerCase();
        const hit = keyLower.find(([k, kl]) => kl === c);
        if (hit) return hit[0];
      }

      const loose = keyLower.find(([k, kl]) =>
        kl.includes("수수료") || kl.includes("fee") || kl.includes("commission") || kl.includes("커미션")
      );

      return loose ? loose[0] : null;
    }

    function parsePercentToRate(value) {
      if (value == null) return null;

      let s = String(value).trim();
      if (!s) return null;

      if (s.includes("%")) {
        s = s.replace("%", "").trim();
        const n = Number(s.replace(/,/g, ""));
        if (Number.isFinite(n)) return n / 100;
        return null;
      }

      const n = Number(s.replace(/,/g, ""));
      if (!Number.isFinite(n)) return null;

      if (n <= 1) return n;
      return n / 100;
    }

    function formatRateAsPercentText(raw, rate) {
      const s = raw == null ? "" : String(raw).trim();
      if (s.includes("%")) return s.replace(/\s+/g, "");

      const pct = rate * 100;
      const fixed = Math.round(pct * 100) / 100;
      const pretty = fixed % 1 === 0 ? String(fixed.toFixed(0)) : String(fixed);

      return `${pretty}%`;
    }

    function formatRateNumber(rate) {
      const pct = rate * 100;
      const fixed = Math.round(pct * 100) / 100;
      return fixed % 1 === 0 ? fixed.toFixed(0) : String(fixed);
    }

    function parseMoney(text) {
      const s = String(text || "").trim();
      if (!s) return null;

      const n = Number(s.replace(/,/g, ""));
      if (!Number.isFinite(n)) return null;

      return n;
    }

    function formatMoney(n) {
      try {
        return Number(n).toLocaleString("ko-KR");
      } catch {
        return String(n);
      }
    }

    function formatValue(v) {
      if (v == null) return "";
      return String(v);
    }

    function setStatus(text, tone) {
      const pill = document.getElementById("statusPill");
      const t = document.getElementById("statusText");

      t.textContent = text;
      pill.classList.remove("ok", "warn");
      pill.classList.add(tone === "ok" ? "ok" : "warn");
    }

    function setResult(text, tone) {
      const pill = document.getElementById("resultPill");
      const t = document.getElementById("resultText");

      t.textContent = text;
      pill.classList.remove("ok", "warn");
      pill.classList.add(tone === "ok" ? "ok" : "warn");
    }

    function showError(msg) {
      document.getElementById("error").textContent = msg;
    }

    function clearError() {
      document.getElementById("error").textContent = "";
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
